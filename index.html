<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FMScouts</title>
<style>
:root{--bg:#0b0d10;--s1:#131720;--s2:#1a2030;--s3:#202840;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);--text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;--accent:#10b981;--accent-bg:rgba(16,185,129,0.1);--accent-border:rgba(16,185,129,0.25);--blue:#3b82f6;--blue-bg:rgba(59,130,246,0.1);--amber:#f59e0b;--red:#ef4444;--purple:#a78bfa;--r:10px;--r-sm:6px}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;min-height:100vh}

.shell{display:flex;min-height:100vh}
.sidebar{width:230px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50}
.main{margin-left:230px;flex:1;padding:28px 28px 60px;min-width:0}

.logo{padding:22px 20px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.logo-mark{width:30px;height:30px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#000;flex-shrink:0}
.logo-text{font-size:16px;font-weight:700;letter-spacing:-.3px}
.logo-text span{color:var(--muted)}

.nav-group{padding:16px 12px 8px}
.nav-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:0 8px 6px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r-sm);color:var(--muted2);cursor:pointer;font-size:13px;transition:all .12s;margin-bottom:1px}
.nav-item:hover{background:var(--s2);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent);font-weight:500}
.nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:.8}
.nav-item.active svg{opacity:1}

.sidebar-footer{margin-top:auto;padding:14px 18px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)}
.updated-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:5px;vertical-align:middle}

.view{display:none}
.view.active{display:block}

.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.page-title{font-size:20px;font-weight:700;letter-spacing:-.3px}
.page-sub{font-size:13px;color:var(--muted)}

.controls{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.inp{background:var(--s1);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text);font-size:13px;padding:8px 12px;outline:none;transition:border .12s}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--muted)}
.inp-search{flex:1;min-width:180px}
.inp option{background:var(--s2)}
.btn{padding:8px 14px;border-radius:var(--r-sm);border:1px solid var(--border2);background:transparent;color:var(--muted2);font-size:13px;cursor:pointer;transition:all .12s;white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.btn.primary:hover{opacity:.88}
.btn.ghost{border-color:transparent;color:var(--muted)}
.btn.ghost:hover{color:var(--accent);border-color:transparent}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:10px}
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;cursor:pointer;transition:border-color .12s,transform .1s}
.card:hover{border-color:var(--border2);transform:translateY(-1px)}
.card.pinned{border-color:var(--accent-border);background:var(--accent-bg)}

.card-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.pname{font-size:13px;font-weight:600;line-height:1.3}
.pmeta{display:flex;align-items:center;gap:4px;margin-top:3px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;letter-spacing:.02em}
.bp{background:var(--blue-bg);color:var(--blue)}
.bp2{background:rgba(255,255,255,.06);color:var(--muted2)}
.bteam{font-size:10px;color:var(--muted)}

.r-block{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:5px}
.r-num{font-size:20px;font-weight:700}
.r-lbl{font-size:10px;color:var(--muted)}
.rbar{height:3px;background:var(--border2);border-radius:2px;overflow:hidden;margin-bottom:10px}
.rbar-fill{height:100%;border-radius:2px;transition:width .5s}

.smini{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.smc{background:var(--s2);border-radius:var(--r-sm);padding:5px 6px;text-align:center}
.smv{font-size:14px;font-weight:600}
.sml{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:1px}

.no-data{font-size:11px;color:var(--muted);font-style:italic;margin-top:6px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:var(--s1);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column}
.modal-head{padding:18px 18px 0;position:sticky;top:0;background:var(--s1);z-index:1;border-radius:14px 14px 0 0}
.modal-hero{display:flex;align-items:center;gap:12px;padding-bottom:14px}
.mav{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.mname{font-size:17px;font-weight:700}
.mmeta{font-size:12px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.mclose{margin-left:auto;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;padding:0;align-self:flex-start}
.mclose:hover{color:var(--text)}
.tabs{display:flex;border-bottom:1px solid var(--border)}
.tab{padding:9px 14px;font-size:13px;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.mbody{padding:18px;flex:1}
.mfoot{padding:0 18px 18px;display:flex;gap:8px}

.igrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.icell{background:var(--s2);border-radius:var(--r-sm);padding:10px 12px}
.ilbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.ival{font-size:15px;font-weight:600;margin-top:3px}

.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.scell{background:var(--s2);border-radius:var(--r-sm);padding:10px 12px}
.sval{font-size:22px;font-weight:700}
.slbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}

.fbars{display:flex;gap:4px;align-items:flex-end;height:64px;margin:12px 0 6px}
.fbar-w{flex:1;display:flex;flex-direction:column;justify-content:flex-end;height:100%}
.fbar{border-radius:3px 3px 0 0;min-height:4px}
.fval{font-size:9px;color:var(--muted);text-align:center;margin-top:2px}
.fmeta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px}

/* Compare */
.cmp-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.cmp-card{background:var(--s1);border:1px solid var(--border2);border-radius:var(--r);padding:16px;text-align:center}
.cmp-r{font-size:34px;font-weight:800;margin:8px 0 3px}
.mrow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.mval{font-size:13px;font-weight:600;width:30px;text-align:right;color:var(--muted2)}
.mval.win{color:var(--accent)}
.mbar-w{flex:1;height:5px;background:var(--s3);border-radius:3px;overflow:hidden;display:flex}
.mbar-a{height:100%;border-radius:3px 0 0 3px;background:var(--accent)}
.mbar-b{height:100%;border-radius:0 3px 3px 0;background:var(--blue);margin-left:auto}
.mlbl{font-size:11px;color:var(--muted);width:80px;text-align:center}

/* TOW */
.tow-list{display:flex;flex-direction:column;gap:8px}
.tow-row{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .12s}
.tow-row:hover{border-color:var(--border2)}
.tow-rank{font-size:17px;font-weight:700;color:var(--muted);min-width:26px}
.tow-rank.g{color:#fbbf24}.tow-rank.s{color:#94a3b8}.tow-rank.b{color:#d97706}
.tow-info{flex:1;min-width:0}
.tow-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tow-sub{font-size:11px;color:var(--muted);margin-top:1px;display:flex;align-items:center;gap:4px}
.tow-r{font-size:18px;font-weight:700}

/* Form view */
.form-leader{background:linear-gradient(135deg,rgba(16,185,129,.12),rgba(59,130,246,.08));border:1px solid var(--accent-border);border-radius:var(--r);padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:14px}

/* Misc */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty h3{font-size:16px;color:var(--text);margin-bottom:6px}
.hint{background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:var(--r);padding:11px 14px;font-size:13px;color:var(--accent);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:20px;border:1px solid var(--border2);color:var(--muted2);cursor:pointer;transition:all .12s}
.chip:hover,.chip.on{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}

/* Rating colours */
.rc-g{color:var(--accent)}.rc-b{color:var(--blue)}.rc-a{color:var(--amber)}.rc-r{color:var(--red)}
.rf-g{background:var(--accent)}.rf-b{background:var(--blue)}.rf-a{background:var(--amber)}.rf-r{background:var(--red)}

@media(max-width:720px){
  .sidebar{transform:translateX(-100%)}.main{margin-left:0}
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="shell">

<nav class="sidebar">
  <div class="logo">
    <div class="logo-mark">FM</div>
    <div class="logo-text">Scouts<span>.cz</span></div>
  </div>
  <div class="nav-group">
    <div class="nav-label">Přehled</div>
    <div class="nav-item active" onclick="setView('players')" id="nv-players">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><circle cx="19" cy="11" r="2"/><path d="M23 21v-1a2 2 0 0 0-2-2h-1"/></svg>
      Hráči
    </div>
    <div class="nav-item" onclick="setView('tow')" id="nv-tow">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      Tým týdne
    </div>
    <div class="nav-item" onclick="setView('form')" id="nv-form">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Forma
    </div>
  </div>
  <div class="nav-group">
    <div class="nav-label">Nástroje</div>
    <div class="nav-item" onclick="setView('compare')" id="nv-compare">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
      Srovnání
    </div>
  </div>
  <div class="sidebar-footer">
    <div><span class="updated-dot"></span>Aktualizováno</div>
    <div style="margin-top:3px;color:var(--muted2)" id="last-updated">—</div>
    <div style="margin-top:8px" id="data-stats"></div>
  </div>
</nav>

<main class="main">

  <!-- Hráči -->
  <div class="view active" id="view-players">
    <div class="page-header">
      <div>
        <div class="page-title">Hráči</div>
        <div class="page-sub" id="player-count">Načítám data...</div>
      </div>
    </div>
    <div class="controls">
      <input class="inp inp-search" type="text" id="search" placeholder="🔍  Hledat hráče..." oninput="renderPlayers()">
      <select class="inp" id="fpos" onchange="renderPlayers()">
        <option value="">Všechny pozice</option>
        <option>GK</option><option>DC</option><option>LB</option><option>RB</option>
        <option>DM</option><option>CM</option><option>AM</option>
        <option>LW</option><option>RW</option><option>ST</option>
      </select>
      <select class="inp" id="fsort" onchange="renderPlayers()">
        <option value="name">Jméno A–Z</option>
        <option value="rating">Rating ↓</option>
        <option value="goals">Góly ↓</option>
        <option value="minutes">Minuty ↓</option>
        <option value="form">Aktuální forma ↓</option>
      </select>
      <select class="inp" id="fdata" onchange="renderPlayers()">
        <option value="">Všichni</option>
        <option value="1">Jen s daty</option>
      </select>
    </div>
    <div class="grid" id="pgrid"></div>
  </div>

  <!-- TOW -->
  <div class="view" id="view-tow">
    <div class="page-header">
      <div>
        <div class="page-title">Tým týdne</div>
        <div class="page-sub">Top 20 hráčů dle průměrného ratingu</div>
      </div>
    </div>
    <div class="tow-list" id="tow-list"></div>
  </div>

  <!-- Forma -->
  <div class="view" id="view-form">
    <div class="page-header">
      <div>
        <div class="page-title">Hráči ve formě</div>
        <div class="page-sub">Seřazeno dle průměru posledních 3 zápasů</div>
      </div>
    </div>
    <div class="grid" id="form-grid"></div>
  </div>

  <!-- Compare -->
  <div class="view" id="view-compare">
    <div class="page-header">
      <div class="page-title">Srovnání hráčů</div>
    </div>
    <div class="hint">💡 Klikni na hráče v záložce Hráči → "Přidat do srovnání" — vyber 2 hráče</div>
    <div id="cmp-content"></div>
  </div>

</main>
</div>

<!-- Modal -->
<div id="overlay" style="display:none" class="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-hero">
        <div class="mav" id="m-av"></div>
        <div style="flex:1;min-width:0">
          <div class="mname" id="m-name"></div>
          <div class="mmeta" id="m-meta"></div>
        </div>
        <button class="mclose" onclick="closeModal()">×</button>
      </div>
      <div class="tabs">
        <button class="tab active" onclick="setTab('profile')">Profil</button>
        <button class="tab" onclick="setTab('stats')">Statistiky</button>
        <button class="tab" onclick="setTab('form')">Forma</button>
      </div>
    </div>
    <div class="mbody" id="m-body"></div>
    <div class="mfoot" id="m-foot"></div>
  </div>
</div>

<script>
let players=[], compareList=[], current=null, currentTab='profile';

const PC={GK:'#f59e0b',DC:'#3b82f6',LB:'#3b82f6',RB:'#3b82f6',DM:'#a78bfa',CM:'#a78bfa',AM:'#10b981',LW:'#ef4444',RW:'#ef4444',ST:'#ef4444'};

function ini(n){return n.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).toUpperCase().join('')}
function rc(r){if(!r)return'';return r>=7.5?'rc-g':r>=6.5?'rc-b':r>=5.5?'rc-a':'rc-r'}
function rfc(r){return rc(r).replace('rc-','rf-')}
function rpct(r){return r?Math.min(100,Math.max(0,((r-4)/6)*100)):0}
function fmt(v,d=2){return v!=null?parseFloat(v).toFixed(d):'—'}

async function loadData(){
  try{
    const r=await fetch('data/players.json');
    if(!r.ok)throw new Error();
    const d=await r.json();
    players=d.players||[];
    if(d.meta?.lastUpdated){
      const dt=new Date(d.meta.lastUpdated);
      document.getElementById('last-updated').textContent=dt.toLocaleDateString('cs-CZ',{day:'numeric',month:'long',year:'numeric'});
    }
    if(d.meta){
      const wr=d.meta.withRatings||players.filter(p=>p.avgRating).length;
      document.getElementById('data-stats').innerHTML=`<span style="color:var(--muted)">${wr} hráčů s ratingem</span>`;
    }
    renderPlayers(); renderTow(); renderForm();
  }catch(e){
    document.getElementById('pgrid').innerHTML=`<div class="empty" style="grid-column:1/-1">
      <h3>Data nenalezena</h3>
      <p>Soubor <code>data/players.json</code> chybí.<br>GitHub Actions spustí scraper automaticky.<br>Nebo přidej <code>players.json</code> ručně.</p>
    </div>`;
    document.getElementById('player-count').textContent='Data nejsou k dispozici';
  }
}

function getFiltered(){
  const q=document.getElementById('search').value.toLowerCase();
  const pos=document.getElementById('fpos').value;
  const sort=document.getElementById('fsort').value;
  const onlyData=document.getElementById('fdata').value==='1';
  let list=players.filter(p=>{
    if(q&&!p.name.toLowerCase().includes(q))return false;
    if(pos&&p.pos!==pos)return false;
    if(onlyData&&!p.avgRating)return false;
    return true;
  });
  if(sort==='rating')list.sort((a,b)=>(b.avgRating||0)-(a.avgRating||0));
  else if(sort==='goals')list.sort((a,b)=>(b.stats?.goals||0)-(a.stats?.goals||0));
  else if(sort==='minutes')list.sort((a,b)=>(b.stats?.minutesPlayed||0)-(a.stats?.minutesPlayed||0));
  else if(sort==='form'){
    list=list.filter(p=>p.ratings?.length>=1);
    list.sort((a,b)=>{
      const ra=a.ratings.slice(-3).map(r=>r.rating);
      const rb=b.ratings.slice(-3).map(r=>r.rating);
      const fa=ra.reduce((x,y)=>x+y,0)/ra.length;
      const fb=rb.reduce((x,y)=>x+y,0)/rb.length;
      return fb-fa;
    });
  }else list.sort((a,b)=>a.name.localeCompare(b.name,'cs'));
  return list;
}

function renderPlayers(){
  const list=getFiltered();
  document.getElementById('player-count').textContent=`${list.length} z ${players.length} hráčů`;
  if(!list.length){
    document.getElementById('pgrid').innerHTML='<div class="empty" style="grid-column:1/-1"><h3>Žádní hráči</h3><p>Zkus jiný filtr</p></div>';
    return;
  }
  document.getElementById('pgrid').innerHTML=list.map(p=>{
    const col=PC[p.pos]||'#888';
    const inC=compareList.some(c=>c.id===p.id);
    const r=p.avgRating;
    const hs=p.stats&&p.stats.goals!=null;
    return`<div class="card${inC?' pinned':''}" onclick="openPlayer(${p.id})">
      <div class="card-top">
        <div class="av" style="background:${col}20;color:${col}">${ini(p.name)}</div>
        <div style="flex:1;min-width:0">
          <div class="pname">${p.name}</div>
          <div class="pmeta">
            <span class="badge bp">${p.pos}</span>
            ${p.pos2?`<span class="badge bp2">${p.pos2}</span>`:''}
            ${p.data?.team?`<span class="bteam">· ${p.data.team}</span>`:''}
          </div>
        </div>
        ${inC?'<span style="color:var(--accent);font-size:16px">★</span>':''}
      </div>
      ${r?`<div class="r-block"><span class="r-num ${rc(r)}">${fmt(r)}</span><span class="r-lbl">prům. rating</span></div>
      <div class="rbar"><div class="rbar-fill ${rfc(r)}" style="width:${rpct(r)}%"></div></div>`
      :'<div class="no-data">Data zatím nejsou</div>'}
      ${hs?`<div class="smini">
        <div class="smc"><div class="smv">${p.stats.goals||0}</div><div class="sml">Góly</div></div>
        <div class="smc"><div class="smv">${p.stats.goalAssist||0}</div><div class="sml">Ass</div></div>
        <div class="smc"><div class="smv">${p.stats.appearances||0}</div><div class="sml">Záp</div></div>
      </div>`:''}
    </div>`;
  }).join('');
}

function openPlayer(id){
  current=players.find(p=>p.id===id);
  if(!current)return;
  const p=current,col=PC[p.pos]||'#888';
  const av=document.getElementById('m-av');
  av.textContent=ini(p.name);
  av.style.cssText=`background:${col}20;color:${col};width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0`;
  document.getElementById('m-name').textContent=p.name;
  document.getElementById('m-meta').innerHTML=`<span class="badge bp">${p.pos}</span>${p.pos2?`<span class="badge bp2">${p.pos2}</span>`:''} ${p.data?.team?`<span style="color:var(--muted)">· ${p.data.team}</span>`:''}`;
  const inC=compareList.some(c=>c.id===p.id);
  document.getElementById('m-foot').innerHTML=`
    <button class="btn${inC?'':' primary'}" onclick="toggleCmp(${p.id})" style="flex:1" id="cmp-btn">${inC?'✓ Odebrat ze srovnání':'+ Přidat do srovnání'}</button>
    ${p.sofascore?`<a href="${p.sofascore}" target="_blank" class="btn">Sofascore ↗</a>`:''}
    ${p.transfermarkt?`<a href="${p.transfermarkt}" target="_blank" class="btn">TM ↗</a>`:''}
  `;
  setTab('profile');
  document.getElementById('overlay').style.display='flex';
}

function closeModal(){document.getElementById('overlay').style.display='none'}

function setTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['profile','stats','form'][i]===tab));
  const p=current; if(!p)return;
  const body=document.getElementById('m-body');
  if(tab==='profile'){
    const d=p.data||{};
    body.innerHTML=`<div class="igrid">
      <div class="icell"><div class="ilbl">Věk</div><div class="ival">${d.age||'—'}</div></div>
      <div class="icell"><div class="ilbl">Národnost</div><div class="ival">${d.country||'—'}</div></div>
      <div class="icell"><div class="ilbl">Klub</div><div class="ival">${d.team||'—'}</div></div>
      <div class="icell"><div class="ilbl">Výška</div><div class="ival">${d.height?d.height+' cm':'—'}</div></div>
      <div class="icell"><div class="ilbl">Preferovaná noha</div><div class="ival">${d.preferredFoot||'—'}</div></div>
      <div class="icell"><div class="ilbl">Tržní hodnota</div><div class="ival">${d.marketValue?'€'+(d.marketValue/1e6).toFixed(1)+'M':'—'}</div></div>
      ${p.avgRating?`<div class="icell" style="border:1px solid var(--accent-border);background:var(--accent-bg)"><div class="ilbl">Průměrný rating</div><div class="ival ${rc(p.avgRating)}">${fmt(p.avgRating,3)}</div></div>`:''}
      ${p.maxRating?`<div class="icell"><div class="ilbl">Max / Min</div><div class="ival">${fmt(p.maxRating)} / ${fmt(p.minRating)}</div></div>`:''}
    </div>`;
  }else if(tab==='stats'){
    const s=p.stats||{};
    if(!Object.keys(s).length){body.innerHTML='<div class="empty">Statistiky nejsou k dispozici</div>';return}
    const gk=p.pos==='GK';
    body.innerHTML=`<div class="sgrid">
      ${gk?`<div class="scell"><div class="sval">${s.saves||0}</div><div class="slbl">Zákroky</div></div>
             <div class="scell"><div class="sval">${s.cleanSheets||0}</div><div class="slbl">Čistá konta</div></div>`
          :`<div class="scell"><div class="sval ${rc(null)}" style="color:var(--accent)">${s.goals||0}</div><div class="slbl">Góly</div></div>
             <div class="scell"><div class="sval">${s.goalAssist||0}</div><div class="slbl">Asistence</div></div>
             <div class="scell"><div class="sval">${s.totalShots||0}</div><div class="slbl">Střely</div></div>
             <div class="scell"><div class="sval">${s.successfulDribbles||0}</div><div class="slbl">Driblingy</div></div>`}
      <div class="scell"><div class="sval">${s.minutesPlayed||0}</div><div class="slbl">Minuty</div></div>
      <div class="scell"><div class="sval">${s.appearances||0}</div><div class="slbl">Zápasy</div></div>
      <div class="scell"><div class="sval">${s.accuratePasses||0}</div><div class="slbl">Přesné přihrávky</div></div>
      <div class="scell"><div class="sval">${s.tackles||0}</div><div class="slbl">Souboje</div></div>
      <div class="scell"><div class="sval" style="color:var(--amber)">${s.yellowCards||0}</div><div class="slbl">Žluté karty</div></div>
      <div class="scell"><div class="sval" style="color:var(--red)">${s.redCards||0}</div><div class="slbl">Červené karty</div></div>
    </div>
    ${s.rating?`<div style="margin-top:10px;padding:10px 14px;background:var(--s2);border-radius:var(--r-sm);display:flex;justify-content:space-between;align-items:center">
      <span style="color:var(--muted);font-size:12px">Sofascore rating (sezóna)</span>
      <span class="${rc(s.rating)}" style="font-size:18px;font-weight:700">${fmt(s.rating)}</span>
    </div>`:''}`;
  }else{
    const rats=p.ratings||[];
    if(!rats.length){body.innerHTML='<div class="empty">Data o formě nejsou k dispozici</div>';return}
    const last=rats.slice(-12);
    const vals=last.map(r=>r.rating);
    const mx=Math.max(...vals);
    body.innerHTML=`<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:2px">
      <span>Posledních ${last.length} zápasů</span>
      <span>prům <strong class="${rc(p.avgRating)}">${fmt(p.avgRating)}</strong></span>
    </div>
    <div class="fbars">${last.map(r=>`<div class="fbar-w" title="${fmt(r.rating)}${r.opponent?' vs '+r.opponent:''}">
      <div class="fbar ${rfc(r.rating)}" style="height:${Math.max(5,(r.rating/mx)*100)}%"></div>
      <div class="fval">${r.rating.toFixed(1)}</div>
    </div>`).join('')}</div>
    <div class="fmeta"><span>min ${Math.min(...rats.map(r=>r.rating)).toFixed(2)}</span><span>max ${Math.max(...rats.map(r=>r.rating)).toFixed(2)}</span></div>`;
  }
}

function toggleCmp(id){
  const p=players.find(x=>x.id===id); if(!p)return;
  if(compareList.some(c=>c.id===id)){compareList=compareList.filter(c=>c.id!==id)}
  else if(compareList.length<2){compareList.push(p)}
  else{compareList=[compareList[1],p]}
  renderPlayers(); renderCompare();
  if(current?.id===id)openPlayer(id);
}

function renderCompare(){
  const el=document.getElementById('cmp-content');
  if(compareList.length<2){
    el.innerHTML='<div class="empty"><h3>Vyber 2 hráče</h3><p>Klikni na kartu hráče → přidat do srovnání</p></div>';
    return;
  }
  const [a,b]=compareList;
  const metrics=[
    {l:'Góly',a:a.stats?.goals||0,b:b.stats?.goals||0},
    {l:'Asistence',a:a.stats?.goalAssist||0,b:b.stats?.goalAssist||0},
    {l:'Minuty',a:a.stats?.minutesPlayed||0,b:b.stats?.minutesPlayed||0},
    {l:'Zápasy',a:a.stats?.appearances||0,b:b.stats?.appearances||0},
    {l:'Střely',a:a.stats?.totalShots||0,b:b.stats?.totalShots||0},
    {l:'Přihrávky',a:a.stats?.accuratePasses||0,b:b.stats?.accuratePasses||0},
    {l:'Souboje',a:a.stats?.tackles||0,b:b.stats?.tackles||0},
    {l:'Driblingy',a:a.stats?.successfulDribbles||0,b:b.stats?.successfulDribbles||0},
  ];
  el.innerHTML=`<div class="cmp-cards">${[a,b].map(p=>{
    const col=PC[p.pos]||'#888';
    return`<div class="cmp-card">
      <div style="width:46px;height:46px;border-radius:50%;background:${col}20;color:${col};display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;margin:0 auto 8px">${ini(p.name)}</div>
      <div style="font-size:14px;font-weight:700">${p.name}</div>
      <div style="margin-top:4px"><span class="badge bp">${p.pos}</span> ${p.data?.team?`<span style="font-size:11px;color:var(--muted)">${p.data.team}</span>`:''}</div>
      <div class="cmp-r ${rc(p.avgRating)}">${fmt(p.avgRating)}</div>
      <div style="font-size:10px;color:var(--muted)">PRŮM. RATING</div>
      <button class="btn ghost" style="margin-top:10px;font-size:11px" onclick="toggleCmp(${p.id})">Odebrat</button>
    </div>`;
  }).join('')}</div>
  <div>${metrics.map(m=>{
    const mx=Math.max(m.a,m.b,1);
    return`<div class="mrow">
      <span class="mval${m.a>m.b?' win':''}">${m.a}</span>
      <div class="mbar-w"><div class="mbar-a" style="width:${(m.a/mx*50).toFixed(1)}%"></div><div class="mbar-b" style="width:${(m.b/mx*50).toFixed(1)}%"></div></div>
      <span class="mval${m.b>m.a?' win':''}" style="text-align:left">${m.b}</span>
      <span class="mlbl">${m.l}</span>
    </div>`;
  }).join('')}</div>`;
}

function renderTow(){
  const sorted=[...players].filter(p=>p.avgRating).sort((a,b)=>b.avgRating-a.avgRating).slice(0,20);
  const el=document.getElementById('tow-list');
  if(!sorted.length){el.innerHTML='<div class="empty"><h3>Žádná data</h3></div>';return}
  el.innerHTML=sorted.map((p,i)=>{
    const col=PC[p.pos]||'#888';
    const rc_cls=i===0?'g':i===1?'s':i===2?'b':'';
    return`<div class="tow-row" onclick="openPlayer(${p.id})">
      <div class="tow-rank ${rc_cls}">${i+1}</div>
      <div class="av" style="width:34px;height:34px;font-size:11px;background:${col}20;color:${col}">${ini(p.name)}</div>
      <div class="tow-info">
        <div class="tow-name">${p.name}</div>
        <div class="tow-sub"><span class="badge bp">${p.pos}</span>${p.data?.team?`<span style="color:var(--muted)">· ${p.data.team}</span>`:''}</div>
      </div>
      <div class="tow-r ${rc(p.avgRating)}">${fmt(p.avgRating)}</div>
    </div>`;
  }).join('');
}

function renderForm(){
  const with_form=players.filter(p=>p.ratings?.length>=3).map(p=>{
    const last3=p.ratings.slice(-3).map(r=>r.rating);
    return{...p,recentAvg:last3.reduce((a,b)=>a+b,0)/last3.length};
  }).sort((a,b)=>b.recentAvg-a.recentAvg).slice(0,30);
  const el=document.getElementById('form-grid');
  if(!with_form.length){el.innerHTML='<div class="empty" style="grid-column:1/-1"><h3>Žádná data formy</h3></div>';return}
  el.innerHTML=with_form.map(p=>{
    const col=PC[p.pos]||'#888';
    const last5=p.ratings.slice(-5);
    const mx=Math.max(...last5.map(r=>r.rating));
    return`<div class="card" onclick="openPlayer(${p.id})">
      <div class="card-top">
        <div class="av" style="background:${col}20;color:${col}">${ini(p.name)}</div>
        <div style="flex:1;min-width:0">
          <div class="pname">${p.name}</div>
          <div class="pmeta"><span class="badge bp">${p.pos}</span>${p.data?.team?`<span class="bteam">· ${p.data.team}</span>`:''}</div>
        </div>
        <div style="text-align:right">
          <div class="r-num ${rc(p.recentAvg)}" style="font-size:17px">${fmt(p.recentAvg)}</div>
          <div style="font-size:9px;color:var(--muted)">posl. 3 záp.</div>
        </div>
      </div>
      <div class="fbars" style="height:40px;margin:0">${last5.map(r=>`<div class="fbar-w"><div class="fbar ${rfc(r.rating)}" style="height:${Math.max(5,(r.rating/mx)*100)}%"></div></div>`).join('')}</div>
    </div>`;
  }).join('');
}

function setView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.getElementById('nv-'+v)?.classList.add('active');
  if(v==='compare')renderCompare();
}

loadData();
</script>
</body>
</html>
