name: Scrape Sofascore

on:
  schedule:
    - cron: '0 3 * * 2'   # Každé úterý ve 3:00 UTC
    - cron: '0 3 * * 5'   # Každý pátek ve 3:00 UTC
  workflow_dispatch:        # Možnost spustit ručně z GitHubu

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Run scraper
        run: python scraper.py
        env:
          SCRAPER_ENV: github_actions

      - name: Commit updated data
        run: |
          git config user.name "FMScouts Bot"
          git config user.email "bot@fmscouts.com"
          git add data/players.json
          git diff --staged --quiet || git commit -m "Data update $(date +'%Y-%m-%d %H:%M')"
          git push
