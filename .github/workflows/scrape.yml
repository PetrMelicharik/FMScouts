name: FMScouts Scraper

on:
  schedule:
    - cron: '0 3 * * 2'   # Úterý — hráči + zápasy
    - cron: '0 3 * * 5'   # Pátek — hráči + zápasy
    - cron: '0 4 * * 1'   # Pondělí — jen zápasy (po víkendu)
    - cron: '0 2 1 * *'   # 1. každého měsíce — Transfermarkt
  workflow_dispatch:
    inputs:
      mode:
        description: 'Co spustit'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - players
          - matches
          - transfermarkt
      days_back:
        description: 'Kolik dní zpět (0 = celá sezóna, výchozí 14)'
        required: false
        default: '14'
      leagues_mode:
        description: 'Které ligy (all = všechny, spring_fall = jen jaro-podzim)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - spring_fall

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Scrape players
        if: ${{ github.event.inputs.mode != 'matches' && github.event.inputs.mode != 'transfermarkt' }}
        run: python scraper.py
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}

      - name: Scrape matches
        if: ${{ github.event.inputs.mode != 'players' && github.event.inputs.mode != 'transfermarkt' }}
        run: python scraper_matches.py
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DAYS_BACK: ${{ github.event.inputs.days_back || '14' }}
          LEAGUES_MODE: ${{ github.event.inputs.leagues_mode || 'all' }}

      - name: Scrape Transfermarkt
        if: ${{ github.event.inputs.mode == 'transfermarkt' || github.event.schedule == '0 2 1 * *' }}
        run: python scraper_transfermarkt.py

      - name: Commit data
        run: |
          git config user.name "FMScouts Bot"
          git config user.email "bot@fmscouts.com"
          git add data/players.json data/tm_data.json || true
          git diff --staged --quiet || git commit -m "Data update $(date +'%Y-%m-%d %H:%M')"
          git push
