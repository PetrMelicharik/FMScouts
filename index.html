<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FMScouts</title>
<style>
:root{
  --bg:#0c0e12;--s1:#13161c;--s2:#1a1e26;--s3:#222733;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#dde2ec;--muted:#5a6278;--muted2:#8892a8;
  --accent:#3b82f6;--accent-bg:rgba(59,130,246,0.1);--accent-border:rgba(59,130,246,0.25);
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;--purple:#a78bfa;
  --r:10px;--r-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;min-height:100vh}

.shell{display:flex;min-height:100vh}
.sidebar{width:230px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50;overflow-y:auto}
.main{margin-left:230px;flex:1;padding:24px;min-width:0}

.logo{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
.logo-text{font-size:16px;font-weight:700;letter-spacing:-.3px}
.logo-text span{color:var(--muted)}

.nav-section{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:16px 16px 6px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 16px;color:var(--muted2);cursor:pointer;font-size:13px;transition:all .12s;border-left:2px solid transparent;margin:1px 0}
.nav-item:hover{color:var(--text);background:var(--s2)}
.nav-item.active{color:var(--accent);background:var(--accent-bg);border-left-color:var(--accent)}
.nav-item svg{width:15px;height:15px;flex-shrink:0}
.nav-league{font-size:11px;padding:6px 16px;color:var(--muted);cursor:pointer;transition:all .12s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-league:hover{color:var(--text);background:var(--s2)}

.sidebar-footer{margin-top:auto;padding:14px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:5px;vertical-align:middle}

.view{display:none}.view.active{display:block}

.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.page-title{font-size:20px;font-weight:700;letter-spacing:-.3px}
.page-sub{font-size:13px;color:var(--muted)}

.controls{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.inp{background:var(--s1);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text);font-size:13px;padding:8px 12px;outline:none;transition:border .12s}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--muted)}
.inp option{background:var(--s2)}
.inp-search{flex:1;min-width:180px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;cursor:pointer;transition:border-color .12s,transform .1s;display:flex;flex-direction:column;gap:10px}
.card:hover{border-color:var(--border2);transform:translateY(-1px)}
.card.pinned{border-color:var(--accent-border)}

.card-top{display:flex;align-items:center;gap:10px}
.av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.pname{font-size:13px;font-weight:600;line-height:1.3}
.pteam{font-size:11px;color:var(--muted);margin-top:2px}

.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.02em}
.bp{background:rgba(59,130,246,.15);color:var(--accent)}
.bn{background:rgba(255,255,255,.06);color:var(--muted2)}

.card-info{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.ci{background:var(--s2);border-radius:var(--r-sm);padding:5px 8px}
.ci-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.ci-val{font-size:12px;font-weight:500;margin-top:1px}

.card-league{font-size:10px;color:var(--muted);padding-top:2px;border-top:1px solid var(--border)}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:var(--s1);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-head{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px}
.mav{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0}
.mname{font-size:18px;font-weight:700}
.mfull{font-size:12px;color:var(--muted);margin-top:2px}
.mclose{margin-left:auto;background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1;align-self:flex-start}
.mclose:hover{color:var(--text)}
.mbody{padding:20px;display:flex;flex-direction:column;gap:12px}
.mfoot{padding:0 20px 20px;display:flex;gap:8px}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.icell{background:var(--s2);border-radius:var(--r-sm);padding:10px 14px}
.ilbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.ival{font-size:15px;font-weight:600;margin-top:3px}

.photo-wrap{display:flex;justify-content:center;margin-bottom:4px}
.player-photo{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--border2);background:var(--s2)}
.photo-placeholder{width:80px;height:80px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;border:2px solid var(--border2)}

.no-stats-banner{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);border-radius:var(--r-sm);padding:10px 14px;font-size:12px;color:var(--amber);display:flex;align-items:center;gap:8px}

.btn{padding:8px 14px;border-radius:var(--r-sm);border:1px solid var(--border2);background:transparent;color:var(--muted2);font-size:13px;cursor:pointer;transition:all .12s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:500}

/* Compare */
.cmp-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.cmp-card{background:var(--s1);border:1px solid var(--border2);border-radius:var(--r);padding:16px;text-align:center}

.hint{background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:var(--r);padding:11px 14px;font-size:13px;color:var(--accent);margin-bottom:16px}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty h3{font-size:16px;color:var(--text);margin-bottom:6px}

.stats-banner{background:var(--s2);border-radius:var(--r);padding:20px;text-align:center;margin-top:1rem}
.stats-banner h3{font-size:15px;font-weight:600;margin-bottom:6px}
.stats-banner p{font-size:13px;color:var(--muted);line-height:1.6}
</style>
</head>
<body>
<div class="shell">
<nav class="sidebar">
  <div class="logo">
    <div class="logo-icon">FM</div>
    <div class="logo-text">Scouts<span>.cz</span></div>
  </div>
  <div class="nav-section">Přehled</div>
  <div class="nav-item active" onclick="setView('players')" id="nv-players">
    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><circle cx="19" cy="11" r="2"/><path d="M23 21v-1a2 2 0 0 0-2-2h-1"/></svg>
    Hráči
  </div>
  <div class="nav-item" onclick="setView('compare')" id="nv-compare">
    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
    Srovnání
  </div>
  <div class="nav-section">Ligy</div>
  <div id="league-nav"></div>
  <div class="sidebar-footer">
    <div><span class="dot"></span>API-Football</div>
    <div style="margin-top:4px;color:var(--muted2)" id="last-updated">—</div>
    <div style="margin-top:4px" id="data-stats"></div>
  </div>
</nav>

<main class="main">
  <div class="view active" id="view-players">
    <div class="page-header">
      <div><div class="page-title">Hráči</div><div class="page-sub" id="player-count">Načítám...</div></div>
    </div>
    <div class="controls">
      <input class="inp inp-search" type="text" id="search" placeholder="Hledat jméno nebo klub..." oninput="renderPlayers()">
      <select class="inp" id="fpos" onchange="renderPlayers()">
        <option value="">Všechny pozice</option>
        <option value="Goalkeeper">Brankáři</option>
        <option value="Defender">Obránci</option>
        <option value="Midfielder">Záložníci</option>
        <option value="Attacker">Útočníci</option>
      </select>
      <select class="inp" id="fleague" onchange="renderPlayers()">
        <option value="">Všechny ligy</option>
      </select>
      <select class="inp" id="fsort" onchange="renderPlayers()">
        <option value="name">Jméno A–Z</option>
        <option value="age_asc">Věk ↑ (nejmladší)</option>
        <option value="age_desc">Věk ↓ (nejstarší)</option>
      </select>
    </div>
    <div class="grid" id="pgrid"></div>
  </div>

  <div class="view" id="view-compare">
    <div class="page-header"><div class="page-title">Srovnání hráčů</div></div>
    <div class="hint">Klikni na hráče → "Přidat do srovnání" — vyber 2 hráče</div>
    <div id="cmp-content"></div>
  </div>
</main>
</div>

<!-- Modal -->
<div id="overlay" style="display:none" class="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <div class="mav" id="m-av"></div>
      <div style="flex:1;min-width:0">
        <div class="mname" id="m-name"></div>
        <div class="mfull" id="m-full"></div>
      </div>
      <button class="mclose" onclick="closeModal()">×</button>
    </div>
    <div class="mbody" id="m-body"></div>
    <div class="mfoot" id="m-foot"></div>
  </div>
</div>

<script>
let players=[], compareList=[], current=null;

const PC={Goalkeeper:'#f59e0b',Defender:'#3b82f6',Midfielder:'#a78bfa',Attacker:'#ef4444'};
const PCS={Goalkeeper:'GK',Defender:'DEF',Midfielder:'MID',Attacker:'FWD'};
const PCS_CZ={Goalkeeper:'Brankář',Defender:'Obránce',Midfielder:'Záložník',Attacker:'Útočník'};

function ini(n){return(n||'').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).toUpperCase().join('')}

async function loadData(){
  try{
    const r=await fetch('data/players.json');
    if(!r.ok)throw new Error();
    const d=await r.json();
    players=d.players||[];
    if(d.meta?.lastUpdated){
      const dt=new Date(d.meta.lastUpdated);
      document.getElementById('last-updated').textContent=dt.toLocaleDateString('cs-CZ',{day:'numeric',month:'long',year:'numeric'});
    }
    document.getElementById('data-stats').innerHTML=`<span style="color:var(--muted2)">${players.length.toLocaleString()} hráčů</span>`;
    populateFilters();
    renderPlayers();
  }catch(e){
    document.getElementById('pgrid').innerHTML=`<div class="empty" style="grid-column:1/-1"><h3>Data nenalezena</h3><p>Spusť GitHub Actions workflow pro stažení dat.</p></div>`;
    document.getElementById('player-count').textContent='—';
  }
}

function populateFilters(){
  const leagues=[...new Set(players.map(p=>p.leagueName))].sort();
  const sel=document.getElementById('fleague');
  leagues.forEach(l=>{
    const o=document.createElement('option');
    o.value=l;o.textContent=l;sel.appendChild(o);
  });
  const nav=document.getElementById('league-nav');
  leagues.forEach(l=>{
    const d=document.createElement('div');
    d.className='nav-league';
    d.textContent=l;
    d.onclick=()=>{document.getElementById('fleague').value=l;setView('players');renderPlayers();};
    nav.appendChild(d);
  });
}

function getFiltered(){
  const q=document.getElementById('search').value.toLowerCase();
  const pos=document.getElementById('fpos').value;
  const league=document.getElementById('fleague').value;
  const sort=document.getElementById('fsort').value;

  let list=players.filter(p=>{
    if(q&&!(p.name||'').toLowerCase().includes(q)&&!(p.teamName||'').toLowerCase().includes(q)&&!(p.nationality||'').toLowerCase().includes(q))return false;
    if(pos&&p.position!==pos)return false;
    if(league&&p.leagueName!==league)return false;
    return true;
  });

  if(sort==='age_asc')list.sort((a,b)=>(a.age||99)-(b.age||99));
  else if(sort==='age_desc')list.sort((a,b)=>(b.age||0)-(a.age||0));
  else list.sort((a,b)=>(a.name||'').localeCompare(b.name||'','cs'));
  return list;
}

function renderPlayers(){
  const list=getFiltered();
  document.getElementById('player-count').textContent=`${list.length.toLocaleString()} hráčů`;
  if(!list.length){
    document.getElementById('pgrid').innerHTML='<div class="empty" style="grid-column:1/-1"><h3>Žádní hráči</h3><p>Zkus jiný filtr</p></div>';
    return;
  }
  const shown=list.slice(0,150);
  document.getElementById('pgrid').innerHTML=shown.map(p=>{
    const col=PC[p.position]||'#888';
    const inC=compareList.some(c=>c.id===p.id&&c.teamId===p.teamId);
    const pos=PCS[p.position]||'—';
    return`<div class="card${inC?' pinned':''}" onclick="openPlayer(${p.id},'${p.teamId}')">
      <div class="card-top">
        <div class="av" style="background:${col}20;color:${col}">${ini(p.name)}</div>
        <div style="flex:1;min-width:0">
          <div class="pname">${p.name}</div>
          <div class="pteam">${p.teamName||'—'}</div>
        </div>
        ${inC?'<span style="color:var(--accent)">★</span>':''}
      </div>
      <div class="card-info">
        <div class="ci"><div class="ci-lbl">Pozice</div><div class="ci-val"><span class="badge bp">${pos}</span></div></div>
        <div class="ci"><div class="ci-lbl">Věk</div><div class="ci-val">${p.age||'—'}</div></div>
        <div class="ci"><div class="ci-lbl">Národnost</div><div class="ci-val" style="font-size:11px">${p.nationality||'—'}</div></div>
        <div class="ci"><div class="ci-lbl">Výška</div><div class="ci-val">${p.height||'—'}</div></div>
      </div>
      <div class="card-league">${p.leagueName||''}</div>
    </div>`;
  }).join('');
  if(list.length>150){
    document.getElementById('pgrid').insertAdjacentHTML('beforeend',`<div class="empty" style="grid-column:1/-1;padding:20px"><p>Zobrazeno 150 z ${list.length} hráčů — upřesni filtr</p></div>`);
  }
}

function openPlayer(id,teamId){
  current=players.find(p=>p.id===id&&String(p.teamId)===String(teamId))||players.find(p=>p.id===id);
  if(!current)return;
  const p=current,col=PC[p.position]||'#888';
  const av=document.getElementById('m-av');
  av.style.cssText=`background:${col}20;color:${col};width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0`;
  av.textContent=ini(p.name);
  document.getElementById('m-name').textContent=p.name;
  document.getElementById('m-full').textContent=`${p.firstname||''} ${p.lastname||''}`.trim()||p.name;

  const inC=compareList.some(c=>c.id===p.id&&String(c.teamId)===String(p.teamId));
  document.getElementById('m-foot').innerHTML=`
    <button class="btn${inC?'':' primary'}" onclick="toggleCmp(${p.id},'${p.teamId}')" style="flex:1">${inC?'✓ Odebrat ze srovnání':'+ Přidat do srovnání'}</button>
  `;

  document.getElementById('m-body').innerHTML=`
    <div class="photo-wrap">
      ${p.photo?`<img src="${p.photo}" class="player-photo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="${p.name}"><div class="photo-placeholder" style="display:none;background:${col}20;color:${col}">${ini(p.name)}</div>`
      :`<div class="photo-placeholder" style="background:${col}20;color:${col}">${ini(p.name)}</div>`}
    </div>
    <div class="info-grid">
      <div class="icell"><div class="ilbl">Pozice</div><div class="ival">${PCS_CZ[p.position]||p.position||'—'}</div></div>
      <div class="icell"><div class="ilbl">Věk</div><div class="ival">${p.age||'—'}</div></div>
      <div class="icell"><div class="ilbl">Národnost</div><div class="ival">${p.nationality||'—'}</div></div>
      <div class="icell"><div class="ilbl">Výška</div><div class="ival">${p.height||'—'}</div></div>
      <div class="icell"><div class="ilbl">Váha</div><div class="ival">${p.weight||'—'}</div></div>
      <div class="icell"><div class="ilbl">Sezóna</div><div class="ival">${p.season||'—'}</div></div>
      <div class="icell" style="grid-column:1/-1"><div class="ilbl">Klub</div><div class="ival">${p.teamName||'—'}</div></div>
      <div class="icell" style="grid-column:1/-1"><div class="ilbl">Liga</div><div class="ival">${p.leagueName||'—'}</div></div>
    </div>
    <div class="no-stats-banner">
      ⚠ Statistiky nejsou dostupné na free plánu API-Football. Po přechodu na placený plán se zobrazí góly, asistence, rating, radar grafy a více.
    </div>
  `;
  document.getElementById('overlay').style.display='flex';
}

function closeModal(){document.getElementById('overlay').style.display='none'}

function toggleCmp(id,teamId){
  const p=players.find(x=>x.id===id&&String(x.teamId)===String(teamId));
  if(!p)return;
  const key=`${id}_${teamId}`;
  if(compareList.some(c=>`${c.id}_${c.teamId}`===key)){compareList=compareList.filter(c=>`${c.id}_${c.teamId}`!==key);}
  else if(compareList.length<2){compareList.push(p);}
  else{compareList=[compareList[1],p];}
  renderPlayers();
  renderCompare();
  if(current?.id===id)openPlayer(id,teamId);
}

function renderCompare(){
  const el=document.getElementById('cmp-content');
  if(compareList.length<2){el.innerHTML='<div class="empty"><h3>Vyber 2 hráče</h3><p>Klikni na hráče → přidat do srovnání</p></div>';return;}
  const [a,b]=compareList;
  el.innerHTML=`<div class="cmp-cards">${[a,b].map(p=>{
    const col=PC[p.position]||'#888';
    return`<div class="cmp-card">
      <div style="width:50px;height:50px;border-radius:50%;background:${col}20;color:${col};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;margin:0 auto 10px">${ini(p.name)}</div>
      <div style="font-size:14px;font-weight:700">${p.name}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">${PCS_CZ[p.position]||'—'}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px">${p.teamName}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px">${p.leagueName}</div>
      <div style="margin-top:10px;display:flex;flex-direction:column;gap:4px">
        <div style="background:var(--s2);border-radius:var(--r-sm);padding:6px 10px;display:flex;justify-content:space-between">
          <span style="font-size:11px;color:var(--muted)">Věk</span><span style="font-size:12px;font-weight:500">${p.age||'—'}</span>
        </div>
        <div style="background:var(--s2);border-radius:var(--r-sm);padding:6px 10px;display:flex;justify-content:space-between">
          <span style="font-size:11px;color:var(--muted)">Výška</span><span style="font-size:12px;font-weight:500">${p.height||'—'}</span>
        </div>
        <div style="background:var(--s2);border-radius:var(--r-sm);padding:6px 10px;display:flex;justify-content:space-between">
          <span style="font-size:11px;color:var(--muted)">Národnost</span><span style="font-size:12px;font-weight:500">${p.nationality||'—'}</span>
        </div>
      </div>
      <button class="btn" style="margin-top:10px;font-size:11px;width:100%" onclick="toggleCmp(${p.id},'${p.teamId}')">Odebrat</button>
    </div>`;
  }).join('')}</div>
  <div class="stats-banner">
    <h3>Statistiky nedostupné</h3>
    <p>Po přechodu na placený plán API-Football ($19/měsíc) se zobrazí<br>góly, asistence, minuty, rating, radar grafy a podrobné srovnání.</p>
  </div>`;
}

function setView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.getElementById('nv-'+v)?.classList.add('active');
  if(v==='compare')renderCompare();
}

loadData();
</script>
</body>
